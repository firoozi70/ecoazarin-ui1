<!doctype html>
<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8" />
<title>نتایج جستجو — اکوآذرین</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
<script>
tailwind.config = { theme: { extend: {
  colors: {
    ink: { 850:'#0E0E0E', 900:'#0A0A0A', 800:'#141414', 700:'#1F1F1F', 500:'#2A2A2A', 400:'#3A3A3A' },
    brand: { red:'#D03A3A', redSoft:'#E66767', green:'#2BA67A', greenSoft:'#5BC79B' },
  },
  fontFamily: { sans: ['Charisma','Peyda','Vazirmatn','system-ui','sans-serif'] }
}}};
</script>
<style>
  @font-face { font-family:'Peyda'; src:url('fonts/Peyda-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Peyda'; src:url('fonts/Peyda-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
  @font-face { font-family:'Peyda'; src:url('fonts/Peyda-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }
  @font-face { font-family:'Charisma'; src:url('fonts/CharismaTF-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Charisma'; src:url('fonts/CharismaTF-Bold.ttf') format('truetype'); font-weight:600; font-display:swap; }
  body { background:#0A0A0A; color:#fff; font-family:'Charisma','Peyda','Vazirmatn',system-ui,sans-serif; }
  .label-peyda { font-family:'Peyda','Charisma','Vazirmatn',system-ui,sans-serif; font-weight:600; font-size:12.5px; }
  mark { background:rgba(208,58,58,.25); color:#fff; padding:0 2px; border-radius:3px; }
</style>
<link rel="stylesheet" href="theme.css" />
</head>
<body>
<div class="max-w-[1100px] mx-auto px-4 md:px-6 py-8">
  <a href="hero.html" class="inline-flex items-center gap-2 text-zinc-400 hover:text-white text-[13px] mb-4">
    <span>›</span> بازگشت به صفحه اصلی
  </a>
  <h1 class="text-2xl md:text-3xl font-bold mb-1">نتایج جستجو</h1>
  <div id="meta" class="text-[13px] text-zinc-400 mb-5"></div>

  <form id="form" class="flex items-center gap-2 h-12 rounded-xl bg-ink-800 border border-ink-400 px-3 mb-6">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-brand-red"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="q" type="search" placeholder="جستجو…" class="flex-1 h-full bg-transparent border-0 outline-none text-[14px] text-white placeholder:text-zinc-500" />
    <button type="submit" class="h-9 px-4 rounded-lg bg-brand-red text-white text-[13px] hover:bg-brand-redSoft">جستجو</button>
  </form>

  <div id="filters" class="flex flex-wrap gap-2 mb-5"></div>
  <div id="results"></div>
</div>

<script src="data.jsx" type="text/plain" id="dataraw"></script>
<script>
// Lightweight loader: fetch data.jsx as text and eval the const definitions to populate window.*
(async () => {
  try {
    const txt = await fetch('data.jsx').then(r => r.text());
    // eval inside a new Function with window in scope
    new Function(txt + '\n; this.__loaded = true;').call(window);
  } catch(e) { console.error('data load failed', e); }

  try {
    const idxTxt = await fetch('search-index.jsx').then(r => r.text());
    new Function(idxTxt).call(window);
  } catch(e) { console.error('index load failed', e); }

  init();
})();

function getQ() {
  const u = new URL(location.href);
  return u.searchParams.get('q') || '';
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const norm = (s)=>s.replace(/[ي]/g,'ی').replace(/[ك]/g,'ک').toLowerCase();
  const safe = escapeHtml(text);
  const tokens = q.split(/\s+/).filter(Boolean).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  if (!tokens.length) return safe;
  const re = new RegExp('(' + tokens.join('|') + ')','gi');
  return safe.replace(re, '<mark>$1</mark>');
}

let CURRENT_FILTER = 'all';

function init() {
  const q = getQ();
  document.getElementById('q').value = q;
  document.getElementById('form').addEventListener('submit', (e) => {
    e.preventDefault();
    const v = document.getElementById('q').value.trim();
    location.href = 'search-results.html?q=' + encodeURIComponent(v);
  });
  render(q);
}

function render(q) {
  const all = (window.searchSite ? window.searchSite(q, 200) : []);
  const cats = ['all', ...Array.from(new Set(all.map(r=>r.category)))];
  const filt = document.getElementById('filters');
  filt.innerHTML = cats.map(c => `<button data-c="${c}" class="filt h-8 px-3 rounded-full text-[12.5px] border ${c===CURRENT_FILTER?'bg-brand-red text-white border-brand-red':'bg-ink-800 text-zinc-300 border-ink-500 hover:border-ink-400'}">${c==='all'?'همه':c}<span class="text-zinc-500 mr-1">(${c==='all'?all.length:all.filter(r=>r.category===c).length})</span></button>`).join('');
  filt.querySelectorAll('.filt').forEach(btn => btn.addEventListener('click', () => {
    CURRENT_FILTER = btn.dataset.c;
    render(q);
  }));

  const list = CURRENT_FILTER==='all' ? all : all.filter(r=>r.category===CURRENT_FILTER);
  const meta = document.getElementById('meta');
  meta.innerHTML = q ? `${list.length} نتیجه برای «<span class="text-white font-semibold">${escapeHtml(q)}</span>»` : 'برای جستجو، عبارتی وارد کنید.';

  const root = document.getElementById('results');
  if (!q) { root.innerHTML = ''; return; }
  if (list.length === 0) {
    root.innerHTML = `<div class="rounded-xl border border-ink-500 bg-ink-800/60 p-10 text-center">
      <div class="mx-auto w-12 h-12 rounded-full bg-ink-700 border border-ink-500 flex items-center justify-center text-zinc-500 mb-3">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      </div>
      <div class="text-[15px] font-semibold mb-1">چیزی یافت نشد</div>
      <div class="text-[13px] text-zinc-400">برای «${escapeHtml(q)}» در هیچ‌کدام از بخش‌های سایت نتیجه‌ای پیدا نشد.</div>
    </div>`;
    return;
  }
  root.innerHTML = `<ul class="grid gap-2">${list.map(r => `
    <li>
      <a href="hero.html${r.url||''}" class="group flex items-start gap-3 p-3.5 rounded-xl bg-ink-800/60 border border-ink-500 hover:border-ink-400 hover:bg-ink-800 transition">
        <span class="label-peyda shrink-0 px-2.5 py-1 rounded-full bg-brand-red/15 text-brand-redSoft border border-brand-red/25">${escapeHtml(r.category)}</span>
        <span class="flex-1 min-w-0">
          <span class="block text-[14.5px] font-semibold leading-7 text-white group-hover:text-brand-redSoft">${highlight(r.title, q)}</span>
          <span class="block text-[12px] text-zinc-500 mt-0.5">${escapeHtml(r.section||'')}${r.meta?' · '+escapeHtml(r.meta):''}${r.tag?' · '+escapeHtml(r.tag):''}</span>
        </span>
        <span class="text-zinc-500 group-hover:text-white">‹</span>
      </a>
    </li>
  `).join('')}</ul>`;
}
</script>
</body>
</html>
